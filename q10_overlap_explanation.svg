<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430">
  <rect width="760" height="430" fill="#ffffff"/>

  <style>
    text { font-family: Arial, sans-serif; fill: #222; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; }
    .axis { stroke: #222; stroke-width: 2; }
    .tick { stroke: #222; stroke-width: 2; }
    .a { fill: #4e79a7; opacity: 0.8; }
    .b { fill: #f28e2b; opacity: 0.8; }
    .overlap { fill: #59a14f; opacity: 0.9; }
    .warn { fill: #e15759; font-weight: 700; }
  </style>

  <text class="title" x="36" y="40">Why check a.xMin &lt; b.xMax?</text>

  <text class="label" x="36" y="84">Example that overlaps</text>
  <line class="axis" x1="90" y1="145" x2="590" y2="145"/>
  <line class="tick" x1="90" y1="137" x2="90" y2="153"/>
  <line class="tick" x1="340" y1="137" x2="340" y2="153"/>
  <line class="tick" x1="465" y1="137" x2="465" y2="153"/>
  <line class="tick" x1="590" y1="137" x2="590" y2="153"/>
  <text class="small" x="84" y="174">0</text>
  <text class="small" x="330" y="174">10</text>
  <text class="small" x="455" y="174">15</text>
  <text class="small" x="584" y="174">20</text>

  <rect class="a" x="90" y="105" width="250" height="28"/>
  <rect class="b" x="215" y="158" width="250" height="28"/>
  <rect class="overlap" x="215" y="105" width="125" height="81"/>
  <text class="small" x="40" y="125">a: 0 to 10</text>
  <text class="small" x="40" y="180">b: 5 to 15</text>
  <text class="small" x="375" y="125">a.xMin &lt; b.xMax  =>  0 &lt; 15 true</text>
  <text class="small" x="375" y="150">a.xMax &gt; b.xMin  => 10 &gt; 5 true</text>
  <text class="small" x="375" y="180">Both true, so X ranges overlap.</text>

  <text class="label" x="36" y="240">Counterexample: b is completely left of a</text>
  <line class="axis" x1="90" y1="310" x2="590" y2="310"/>
  <line class="tick" x1="90" y1="302" x2="90" y2="318"/>
  <line class="tick" x1="215" y1="302" x2="215" y2="318"/>
  <line class="tick" x1="340" y1="302" x2="340" y2="318"/>
  <line class="tick" x1="590" y1="302" x2="590" y2="318"/>
  <text class="small" x="84" y="340">0</text>
  <text class="small" x="205" y="340">5</text>
  <text class="small" x="330" y="340">10</text>
  <text class="small" x="584" y="340">20</text>

  <rect class="b" x="90" y="270" width="125" height="28"/>
  <rect class="a" x="340" y="323" width="250" height="28"/>
  <text class="small" x="40" y="290">b: 0 to 5</text>
  <text class="small" x="40" y="345">a: 10 to 20</text>
  <text class="small warn" x="375" y="290">a.xMin &lt; b.xMax  => 10 &lt; 5 false</text>
  <text class="small" x="375" y="318">This catches the case where a starts after b ends.</text>
  <text class="small" x="375" y="345">No X overlap, so rectangles cannot overlap.</text>
</svg>
